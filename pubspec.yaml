name: ai_store_assistant
description: AI-powered retail management platform for grocery stores and small businesses.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Navigation
  go_router: ^14.2.0

  # State Management
  provider: ^6.1.2

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0

  # Internationalization
  intl: ^0.20.2

  # Icons
  cupertino_icons: ^1.0.6
  drift: ^2.34.2
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.6
  path: ^1.9.1
  uuid: ^4.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.34.4
  build_runner: ^2.15.2

flutter:
  uses-material-design: true
  generate: true
